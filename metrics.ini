[Common]
ScreenHeight=480
InitialScreen="ScreenInit"
AutoJoin=true
AutoSetStyle=true

[ScreenInit]
NextScreen="ScreenTitleMenu"
AllowStartToSkip=true
ForceTimer=false
TimerSeconds=2.6
TimerStealth=true


[ScreenTitleMenu]
ChoiceNames="GameStart,Options,PackDownloader,ChartEditor,Calibrate,EtternaGithub,ThemeGithub,CustomTest,Exit"
ChoiceGameStart="applydefaultoptions;text,Start;screen,"..Branch.AfterTitleMenu()
ChoiceOptions="screen,ScreenOptionsService;text,Options"
ChoicePackDownloader="screen,ScreenPackDownloader;text,Pack Downloader"
ChoiceChartEditor="screen,ScreenOptionsEdit;text,Chart Editor"
ChoiceCalibrate="screen,ScreenGameplaySyncMachine;text,Calibrate Input Sync"
ChoiceEtternaGithub="lua,ms.OpenEtternaGitHub;text,Etterna GitHub"
ChoiceThemeGithub="lua,ms.OpenThemeGitHub;text,Theme GitHub"
ChoiceCustomTest="screen,ScreenCustomTest;text,custom testing screen"
ChoiceExit="screen,ScreenExit;text,Exit"
PrevScreen="ScreenInit"
NextScreen="ScreenTitleMenu"
PreSwitchPageSeconds=0
PostSwitchPageSeconds=0


[ScreenPackDownloader]
Class="ScreenSplash"
Fallback="ScreenSplash"
NextScreen="ScreenTitleMenu"
PrevScreen="ScreenTitleMenu"
AllowStartToSkip=false
TimerSeconds=-1

[ScreenCustomTest]
Class="ScreenWithMenuElements"
Fallback="ScreenWithMenuElements"
NextScreen="ScreenTitleMenu"
PrevScreen="ScreenTitleMenu"

[ScreenOptionsService]
LineNames="GameType,GraphicSound,KeyConfig,InputOptions,SoundGraphics,Profiles,Network,Advanced"

[ScreenSelectProfile]
ScreenOnCommand=%function(self) self:lockinput(0.2) end

[ScreenSelectStyle]
ScrollerTransform=function(self,offset,itemIndex,numItems) self:y(32*(itemIndex-(numItems-1)/2)) end

[ScreenSelectMusic]
MusicWheelX=0
CodeNames="NextRate,PrevRate"
CodeNextRate="EffectDown"
CodePrevRate="EffectUp"

[MusicWheel]
ItemTransformFunction=function(self,offsetFromCenter,itemIndex,numItems) \
self:x( 17 ) \
self:y( offsetFromCenter*16 ) \
self:halign(0) \
end
NumWheelItems=32
ScrollBarHeight=SCREEN_HEIGHT
ScrollBarOnCommand=visible,true;y,0;zoomx,0.3;zoomy,0.8;

ModeMenuChoiceNames="Group,Title,Bpm,Artist,Genre,Favorites,Overall,Stream,Jumpstream,Handstream,Stamina,JackSpeed,Chordjack,Technical,Length"

[MusicWheelItem]
SongNameX=15
SectionExpandedX=3
SectionExpandedY=-2
SectionExpandedOnCommand=zoom,0.5;halign,0;stopeffect;maxwidth,capWideScale(get43size(290),290)/0.5;
SectionCollapsedX=3
SectionCollapsedY=-2
SectionCollapsedOnCommand=zoom,0.5;halign,0;stopeffect;maxwidth,capWideScale(get43size(290),290)/0.5;
SectionCountX=capWideScale(get43size(350),350)-20
SectionCountOnCommand=halign,1;zoom,0.3;diffuse,color(".8,.8,.8,1")
SortX=3
SortOnCommand=zoom,0.5;halign,0;stopeffect;maxwidth,capWideScale(get43size(290),290)/0.5;

[TextBanner]
TitleOnCommand=halign,0;zoom,0.3;y,-5;maxwidth,((capWideScale(get43size(350),350))-50)/0.3;
SubtitleOnCommand=halign,0;zoom,0.2;maxwidth,((capWideScale(get43size(350),350))-50)/0.2;y,2;
ArtistOnCommand=halign,1;zoom,0.2;x,capWideScale(get43size(365),365)-50;maxwidth,capWideScale(get43size(280),280)/0.2;
ArtistPrependString="~"
AfterSetCommand=

[SongManager]
SongGroupColor1=color(".8,.8,.8,1")
ExtraColor=color(".8,.8,.8,1")

[StreamDisplay]
PillTransformFunction=function(self,itemIndex,numItems) \
	local offset = itemIndex / numItems \
	self:x(-35); \
	self:zoomto(200,5); \
end;
NumPills=1

[StepsDisplayListRow]
# Horizontal layout: items are placed side by side left-to-right
# itemIndex goes 1..NumShownItems, center item = cursor position
# We offset each item by 68px steps so they sit in a row
ItemTransformFunction=function(self,offset,itemIndex,numItems) \
self:y( -offset * 60 ) \
end
ItemsSpacingY=-60
NumShownItems=6
CapitalizeDifficultyNames=true
MoveCommand=
ShowMeter=true
MeterX=12
MeterY=0
MeterOnCommand=zoom,0.55;rotationz,-90;
MeterSetCommand=
ShowDescription=true
DescriptionX=-10
DescriptionY=0
DescriptionOnCommand=zoom,0.38;maxwidth,50/0.38;rotationz,-90;
DescriptionSetCommand=


[BPMDisplay]
SetNoBpmCommand=
SetNormalCommand=
SetChangeCommand=
SetRandomCommand=
SetExtraCommand=

[ScreenGameplay]
OverlayOnCommand=visible,true

[Combo]
# Hide default combo by setting threshold impossibly high
ShowComboAt=999999
ShowMissesAt=999999
PulseCommand=visible,false

[Gameplay]
# To match Etterna standards
ComboIsPerRow=false

[Player]
# Standard Til Death/Rebirth receptor positions
ReceptorYUpScroll=-160
ReceptorYDownScroll=160
ReceptorYStandard=-160
ReceptorYReverse=160
DrawOrder=110

[NoteField]
# Standard NoteField behavior
ShowReceptorSubdivisions=true
